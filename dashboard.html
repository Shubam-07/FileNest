<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - FileNest</title>
  <style>
    /* Reset and body styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f4f6f8;
      color: #3c4043;
    }

    /* Sidebar styling */
    #sidebar {
      width: 250px;
      background-color: #202124;
      color: white;
      padding: 20px;
      position: fixed;
      height: 100%;
      overflow-y: auto;
    }

    .logo-title {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background-color: #0073e6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      overflow: hidden; 
    }

    .logo img {
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }

    .logo-title h1 {
      font-size: 1.5em;
      font-weight: bold;
      color: white;
      margin: 0;
    }

    .new-button-container {
      text-align: center;
    }

    #newButton {
      width: 90%;
      padding: 10px;
      border: none;
      background-color: #4285f4;
      color: white;
      cursor: pointer;
      font-size: 1em;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    #newButton:hover {
      background-color: #357ae8;
    }

    #newDropdown {
      display: none;
      background-color: #fff;
      color: #333;
      position: absolute;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }

    #newDropdown div {
      padding: 8px;
      cursor: pointer;
    }

    #newDropdown div:hover {
      background-color: #f4f4f4;
    }

    .sidebar-item {
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 5px;
      text-align: left;
      color: #e8eaed;
    }

    .sidebar-item a {
      color: inherit;
      text-decoration: none;
    }

    .sidebar-item:hover {
      background-color: #35363a;
    }

    /* Main Content styling */
    #main-content {
      margin-left: 270px;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .search-container {
      position: relative;
      width: 70%;
    }

    #searchBar {
      width: 100%;
      padding: 10px;
      border: 1px solid #dadce0;
      border-radius: 20px;
      padding-left: 35px;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 10px;
      font-size: 1.2em;
      color: #5f6368;
    }

    #avatar {
      border-radius: 50%;
      height: 40px;
      cursor: pointer;
    }

    .file-column, .file-row {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    p {
      font-size: 1em;
      color: #555;
    }

    /* File styling */
    .file {
      background-color: #ffffff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .file:hover {
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }

    .file-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .file-info strong {
      font-size: 1em;
    }

    .file-options {
      text-align: right;
    }

    .file-options button {
      margin-top: 10px;
      padding: 5px 10px;
      font-size: 0.9em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #4285f4;
      color: white;
    }

    .file-options button:hover {
      background-color: #357ae8;
    }

    /* Modal styling */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .modal-content h3 {
      margin-top: 0;
      color: #333;
    }

    .label {
      display: block;
      margin: 10px 0;
      font-weight: bold;
      color: #555;
    }

    input[type="email"], input[type="checkbox"] {
      margin: 5px 0 15px 0;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: calc(100% - 16px);
      box-sizing: border-box;
    }

    input[type="checkbox"] {
      width: auto;
    }

    button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px 15px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }

    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="logo-title">
      <div class="logo"><img src="image.png" alt="FileNest Logo"></div>
      <h1>FileNest</h1>
    </div>
    <div class="new-button-container">
      <button id="newButton">+ New</button>
      <div id="newDropdown" class="dropdown">
        <div id="uploadFileOption">Upload File</div>
      </div>
    </div>
    <div class="sidebar-item"><a href="dashboard.html">Home</a></div>
    <div class="sidebar-item"><a href="mydrive.html">My Drive</a></div>
    <div class="sidebar-item"><a href="trash.html">Trash</a></div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <header>
      <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search in Drive">
        <span class="search-icon">🔍</span>
      </div>
      <div class="account">
        <a href="account.html"><img src="avatar.png" id="avatar" alt="Account Avatar"></a>
      </div>
    </header>

    <div id="fileContainer" class="file-column">
      <p>Welcome to your FileNest dashboard! Start uploading files to manage them easily.</p>
    </div>
  </div>

  <input type="file" id="fileInput" style="display: none;">

  <!-- Permissions Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <h3 id="modalTitle">Set Permissions</h3>
      <label>Recipient Email: <input type="email" id="recipientEmail" placeholder="Enter recipient email"></label>
      <label><input type="checkbox" id="viewPermission"> View</label>
      <label><input type="checkbox" id="editPermission"> Edit</label>
      <button id="savePermissions">Save Permissions</button>
    </div>
  </div>

  <script>
    const fileContainer = document.getElementById('fileContainer');
    const fileInput = document.getElementById('fileInput');
    const newButton = document.getElementById('newButton');
    const newDropdown = document.getElementById('newDropdown');
    const uploadFileOption = document.getElementById('uploadFileOption');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');
    const savePermissions = document.getElementById('savePermissions');
    const recipientEmail = document.getElementById('recipientEmail');
    const viewPermission = document.getElementById('viewPermission');
    const editPermission = document.getElementById('editPermission');

    // Unified storage key
    let files = JSON.parse(localStorage.getItem('files')) || [];
    let trash = JSON.parse(localStorage.getItem('trash')) || [];

    newButton.addEventListener('click', () => {
      newDropdown.style.display = newDropdown.style.display === 'none' || newDropdown.style.display === '' ? 'block' : 'none';
    });

    uploadFileOption.addEventListener('click', () => {
      fileInput.click();
      newDropdown.style.display = 'none';
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        // Check for duplicate file names
        if (files.some(f => f.name === file.name)) {
          alert('A file with this name already exists.');
          return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
          const newFile = {
            name: file.name,
            type: file.type || 'Unknown',
            data: e.target.result, // Base64 data
            permissions: []
          };
          files.push(newFile);
          updateLocalStorage();
          renderFiles();
        };
        reader.readAsDataURL(file);
      }
    });

    const updateLocalStorage = () => {
      localStorage.setItem('files', JSON.stringify(files));
      localStorage.setItem('trash', JSON.stringify(trash));
    };

    const openModal = (index) => {
      const file = files[index];
      modal.style.display = 'block';
      savePermissions.onclick = () => {
        const email = recipientEmail.value.trim();
        if (email === '') {
          alert('Please enter a valid email.');
          return;
        }
        const permissions = {
          email,
          view: viewPermission.checked,
          edit: editPermission.checked
        };
        file.permissions.push(permissions);
        updateLocalStorage();
        renderFiles();
        modal.style.display = 'none';
        // Reset modal fields
        recipientEmail.value = '';
        viewPermission.checked = false;
        editPermission.checked = false;
      };
    };

    closeModal.addEventListener('click', () => {
      modal.style.display = 'none';
      // Reset modal fields
      recipientEmail.value = '';
      viewPermission.checked = false;
      editPermission.checked = false;
    });

    window.addEventListener('click', (event) => {
      if (event.target == modal) {
        modal.style.display = 'none';
        // Reset modal fields
        recipientEmail.value = '';
        viewPermission.checked = false;
        editPermission.checked = false;
      }
    });

    const renderFiles = () => {
      console.log('Rendering files:', files); // Debugging line
      fileContainer.innerHTML = '';
      if (files.length === 0) {
        fileContainer.innerHTML = '<p>No files available. Upload a file to get started.</p>';
        return;
      }
      files.forEach((file, index) => {
        console.log('Rendering file:', file); // Debugging line
        const fileElement = document.createElement('div');
        fileElement.className = 'file';
        const permissions = file.permissions.map(permission => {
          return `<div>${permission.email} - ${permission.view ? 'View' : ''} ${permission.edit ? 'Edit' : ''}</div>`;
        }).join('');
        fileElement.innerHTML = `
          <div class="file-info">
            <strong>${file.name}</strong>
            <div class="file-options">
              <button onclick="openModal(${index})">Share</button>
              <button onclick="deleteFile(${index})">Delete</button>
            </div>
          </div>
          <div class="file-permissions">${permissions}</div>
        `;
        fileContainer.appendChild(fileElement);
      });
    };

    const deleteFile = (index) => {
      const deletedFile = files.splice(index, 1)[0];
      trash.push(deletedFile);
      updateLocalStorage();
      renderFiles();
      alert(`File "${deletedFile.name}" moved to Trash.`);
    };

    // Expose deleteFile and openModal to the global scope for inline onclick handlers
    window.deleteFile = deleteFile;
    window.openModal = openModal;

    renderFiles();
  </script>
</body>
</html>
