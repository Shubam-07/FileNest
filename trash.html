<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trash</title>
  <style>
    /* General Styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }

    /* Sidebar */
    #sidebar {
      width: 250px;
      background-color: #333;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .logo-title {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 40px;
      height: 40px;
    }

    .logo-title h1 {
      margin-left: 10px;
    }

    .sidebar-item a {
      color: white;
      text-decoration: none;
      padding: 10px 0;
      display: block;
      margin-bottom: 10px;
    }

    .sidebar-item a:hover {
      background-color: #444;
      border-radius: 5px;
      padding-left: 10px;
    }

    /* Main Content */
    #main-content {
      flex: 1;
      padding: 20px;
    }

    header {
      border-bottom: 2px solid #ccc;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    .file-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .file {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 5px;
      width: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .file-options button {
      margin: 5px 0;
      background-color: #28a745;
      color: white;
      border: none;
      padding: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    .file-options button.delete {
      background-color: #ff4d4d;
    }

    .file-options button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="logo-title">
      <div class="logo"><img src="image.png" alt="FileNest Logo"></div>
      <h1>FileNest</h1>
    </div>
    <div class="sidebar-item"><a href="dashboard.html">Home</a></div>
    <div class="sidebar-item"><a href="mydrive.html">My Drive</a></div>
    <div class="sidebar-item"><a href="trash.html">Trash</a></div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <header>
      <h2>Trash</h2>
    </header>
    <div id="trashContainer" class="file-row">
      <p>No files in Trash.</p>
    </div>
  </div>

  <script>
    const trashContainer = document.getElementById('trashContainer');
    let trash = JSON.parse(localStorage.getItem('trash')) || [];

    function renderTrash() {
      trashContainer.innerHTML = '';

      if (trash.length === 0) {
        trashContainer.innerHTML = '<p>No files in Trash.</p>';
        return;
      }

      trash.forEach((file, index) => {
        const fileDiv = document.createElement('div');
        fileDiv.className = 'file';

        fileDiv.innerHTML = `
          <div class="file-info">
            <strong>${file.name}</strong>
            <span class="file-type">${file.type}</span>
          </div>
          <div class="file-options">
            <button onclick="restoreFile(${index})">Restore</button>
            <button class="delete" onclick="deleteFile(${index})">Delete</button>
          </div>
        `;

        trashContainer.appendChild(fileDiv);
      });
    }

    function restoreFile(index) {
      let files = JSON.parse(localStorage.getItem('files')) || [];
      const restoredFile = trash.splice(index, 1)[0];

      // Prevent duplicate files from being added
      if (!files.some(f => f.name === restoredFile.name)) {
        files.push(restoredFile);
        localStorage.setItem('trash', JSON.stringify(trash));
        localStorage.setItem('files', JSON.stringify(files));
        renderTrash();
        alert(`File "${restoredFile.name}" restored to My Drive.`);
      } else {
        alert('This file already exists in My Drive.');
      }
    }

    function deleteFile(index) {
      if (confirm('Are you sure you want to permanently delete this file?')) {
        const deletedFile = trash.splice(index, 1)[0];
        localStorage.setItem('trash', JSON.stringify(trash));
        renderTrash();
        alert(`File "${deletedFile.name}" has been permanently deleted.`);
      }
    }

    renderTrash();
  </script>
</body>
</html>
